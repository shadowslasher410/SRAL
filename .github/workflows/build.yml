name: Build
on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-Stable'
      - '[0-9]+.[0-9]+.[0-9]+-RC'
      - '[0-9]+.[0-9]+.[0-9]+-Beta'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
  workflow_dispatch:
  
  workflow_call:
    inputs:
      release_version:
        description: 'Dynamic version passed from release workflow'
        required: false
        type: string
        default: ''

permissions: {}

concurrency:
  group: build-${{ github.ref }}-${{ inputs.release_version || github.sha }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_call' }}

defaults:
  run:
    shell: bash
jobs:
  desktop:
    name: Desktop (${{ matrix.os }} - ${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            variant: debug
          - os: windows-latest
            name: windows-x64
            variant: release
          - os: macos-latest
            name: macos-universal
            variant: release

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Hardened Dependencies via Cryptographic Hashes
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Setup Visual Studio Developer Environment (Windows-Only)
        if: runner.os == 'Windows'
        uses: mlocati/setup-msvc@ade6aff3df872d66c12a63dcacdddf0041cb2693 # v1.3.1
        with:
          architecture: x64

      - name: Cache Linux System APT Development Packages
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-dev-packages-${{ hashFiles('**/meson.build') }}
          restore-keys: |
            ${{ runner.os }}-apt-dev-packages-

      - name: Install dependencies (Linux System Headers)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -y
          sudo -E apt-get install -y --no-install-recommends \
            libspeechd-dev libdbus-1-dev libatspi2-dev brltty libbrlapi-dev

      - name: Configure Project Sandbox (Meson)
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist"
        run: |
          set -euo pipefail
          meson setup builddir_${{ matrix.variant }} \
            --buildtype=${{ matrix.variant }} \
            --prefix="$WORKSPACE_PREFIX" \
            -DSRAL_DEV_SANITIZERS=${{ matrix.variant == 'debug' }} \
            -Ddefault_library=both \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=true \
            -DBUILD_TESTS=true \
            -DBUILD_BINDINGS=true \
            -DSRAL_INSTALL_BINDING_SOURCES=true
      
      - name: Print Hidden Meson Log on Failure
        if: failure() || always()
        run: |
          set -euo pipefail
          echo "=== DUMPING INTERNAL MESON LOG ==="
          if [ -f "builddir_${{ matrix.variant }}/meson-logs/meson-log.txt" ]; then
            cat builddir_${{ matrix.variant }}/meson-logs/meson-log.txt
          else
            echo "builddir_${{ matrix.variant }}/meson-logs/meson-log.txt not found!"
          fi

      - name: Compile and Link Targets
        run: |
          set -euo pipefail
          meson compile -C builddir_${{ matrix.variant }}

      - name: Install into staging tree
        run: |
          set -euo pipefail
          meson install -C builddir_${{ matrix.variant }}

      - name: Archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-${{ matrix.name }}-${{ matrix.variant }}
          path: "${{ github.workspace }}/dist"
          if-no-files-found: error
  android:
    name: Android (${{ matrix.abi }} - ${{ matrix.variant }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]
        variant: [debug, release]
        include:
          - abi: arm64-v8a
            arch: aarch64
          - abi: x86_64
            arch: x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Hardened Dependencies via Cryptographic Hashes
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Set up JetBrains Runtime JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v4.5.0
        with:
          distribution: 'jetbrains'
          java-version: '25'
      
      - name: Set up Base Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        env:
          ACCEPT_ANDROID_SDK_LICENSES: 'true'

      - name: Cache Android NDK r27c Workspace
        id: cache-ndk
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /opt/hostedtoolcache/ndk
          key: ${{ runner.os }}-ndk-r27c

      - name: Set up Native Linux Android NDK (r27)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: setup-ndk
        with:
          ndk-version: r27c
          link-to-sdk: true

      - name: Create Android Cross File Dynamically
        env:
          SECRET_NDK: ${{ secrets.ANDROID_NDK_HOME }}
          ARCH: ${{ matrix.arch }}
          ABI: ${{ matrix.abi }}
        run: |
          set -euo pipefail
          TARGET_NDK="${SECRET_NDK:-${ANDROID_NDK_ROOT:-${ANDROID_NDK_HOME:-}}}"
          
          if [ -z "$TARGET_NDK" ]; then
            if [ -d "/opt/hostedtoolcache/ndk/r27c/x64" ]; then
              TARGET_NDK="/opt/hostedtoolcache/ndk/r27c/x64"
            elif [ -d "/usr/local/lib/android/sdk/ndk-bundle" ]; then
              TARGET_NDK="/usr/local/lib/android/sdk/ndk-bundle"
            else
              FOUND_NDK=$(find /usr/local/lib/android/sdk/ndk -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -n 1 || true)
              TARGET_NDK="${FOUND_NDK:-}"
            fi
          fi
          
          if [ -z "$TARGET_NDK" ] || [ ! -d "$TARGET_NDK" ]; then
            echo "::error::Failed to locate Android NDK."
            exit 1
          fi
          
          API_FLOOR="21"
          HOST_PLATFORM="linux-x86_64"
          TOOLCHAIN_BIN="$TARGET_NDK/toolchains/llvm/prebuilt/$HOST_PLATFORM/bin"
          
          cat << EOF > android_cross.txt
          [binaries]
          c   = '$TOOLCHAIN_BIN/$ARCH-linux-android$API_FLOOR-clang'
          cpp = '$TOOLCHAIN_BIN/$ARCH-linux-android$API_FLOOR-clang++'
          ar  = '$TOOLCHAIN_BIN/llvm-ar'
          strip = '$TOOLCHAIN_BIN/llvm-strip'

          [properties]
          sys_root = '$TARGET_NDK/toolchains/llvm/prebuilt/$HOST_PLATFORM/sysroot'

          [host_machine]
          system = 'android'
          cpu_family = '$ARCH'
          cpu = '$ABI'
          endian = 'little'
          EOF

      - name: Configure Android Target Sandbox Options
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist"
        run: |
          set -euo pipefail
          meson setup builddir_${{ matrix.variant }} \
            --cross-file android_cross.txt \
            --buildtype=${{ matrix.variant }} \
            --prefix="$WORKSPACE_PREFIX" \
            -DSRAL_DEV_SANITIZERS=${{ matrix.variant == 'debug' }} \
            -DTARGET_ANDROID=true \
            -DVERSION_MINTARGET_ANDROID=21 \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false

      - name: Compile Mobile ARM64 Architecture Shared Libraries
        run: |
          set -euo pipefail
          meson compile -C builddir_${{ matrix.variant }}

      - name: Archive Android artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-android-${{ matrix.abi }}-${{ matrix.variant }}
          path: "${{ github.workspace }}/dist"
          if-no-files-found: error
  webassembly:
    name: WebAssembly (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        variant: [debug, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Emscripten Toolchain
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 6.0.2
          actions-cache-folder: 'emsdk-cache'
      
      - name: Verify EMSDK Local Environment Setup
        run: emcc -v

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Hardened Dependencies via Cryptographic Hashes
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Create WebAssembly Hardened Cross File
        run: |
          set -euo pipefail
          cat << 'EOF' > emscripten_cross.txt
          [binaries]
          c = 'emcc'
          cpp = 'em++'
          ar = 'emar'
          strip = 'emstrip'

          [properties]
          c_args        = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror', '-pthread', '-Qunused-arguments']
          cpp_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror', '-pthread', '-Qunused-arguments']
          c_link_args   = ['-pthread', '-sSTACK_OVERFLOW_CHECK=2', '-sASSERTIONS=1', '-sWASM_BIGINT']
          cpp_link_args = ['-pthread', '-sSTACK_OVERFLOW_CHECK=2', '-sASSERTIONS=1', '-sWASM_BIGINT']

          [host_machine]
          system = 'emscripten'
          cpu_family = 'wasm32'
          cpu = 'wasm32'
          endian = 'little'
          EOF

      - name: Configure WebAssembly Cross Compilation Pass
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist"
        run: |
          set -euo pipefail
          source $EMSDK_NODE/../../emsdk_env.sh
          meson setup builddir_${{ matrix.variant }} \
            --cross-file emscripten_cross.txt \
            --buildtype=${{ matrix.variant }} \
            --prefix="$WORKSPACE_PREFIX" \
            -DSRAL_DEV_SANITIZERS=false \
            -Ddefault_library=static \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=false \
            -DTARGET_CHROMEVOX=true \
            -DSRAL_WITH_CHROMEVOX=true \
            -DSRAL_INSTALL_BINDING_SOURCES=true

      - name: Compile Static Object Graph
        run: |
          set -euo pipefail
          source $EMSDK_NODE/../../emsdk_env.sh
          meson compile -C builddir_${{ matrix.variant }}

      - name: Install into staging tree
        run: |
          set -euo pipefail
          source $EMSDK_NODE/../../emsdk_env.sh
          meson install -C builddir_${{ matrix.variant }}

      - name: Archive WebAssembly artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-wasm-${{ matrix.variant }}
          path: "${{ github.workspace }}/dist"
          if-no-files-found: error
  ios:
    name: iOS Framework (${{ matrix.variant }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        variant: [debug, release]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
 
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Hardened Dependencies via Cryptographic Hashes
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Create iOS Hardware Device Cross File
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          if [ -z "${SDK_PATH}" ] || [ ! -d "${SDK_PATH}" ]; then
            echo "::error::iPhoneOS SDK environment context resolution failed."
            exit 1
          fi

          cat << EOF > ios_device_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-arch', 'arm64', '-miphoneos-version-min=26.0']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-arch', 'arm64', '-miphoneos-version-min=26.0']
          ar = 'ar'
          strip = 'strip'

          [properties]
          c_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          cpp_args    = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']

          [host_machine]
          system = 'ios'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

      - name: Create iOS Simulator ARM64 Cross File
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          if [ -z "${SDK_PATH}" ] || [ ! -d "${SDK_PATH}" ]; then
            echo "::error::iPhoneSimulator SDK environment context resolution failed."
            exit 1
          fi

          cat << EOF > ios_sim_arm64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-target', 'arm64-apple-ios26.0-simulator']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-target', 'arm64-apple-ios26.0-simulator']
          ar = 'ar'
          strip = 'strip'

          [properties]
          c_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          cpp_args    = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']

          [host_machine]
          system = 'ios'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

      - name: Create iOS Simulator X86_64 Cross File
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          if [ -z "${SDK_PATH}" ] || [ ! -d "${SDK_PATH}" ]; then
            echo "::error::iPhoneSimulator X86_64 target SDK context resolution failed."
            exit 1
          fi

          cat << EOF > ios_sim_x86_64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-target', 'x86_64-apple-ios26.0-simulator']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-target', 'x86_64-apple-ios26.0-simulator']
          ar = 'ar'
          strip = 'strip'

          [properties]
          c_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          cpp_args    = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']

          [host_machine]
          system = 'ios'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF

      - name: Configure and Compile iOS Device Target
        run: |
          set -euo pipefail
          meson setup build-device-${{ matrix.variant }} --cross-file ios_device_cross.txt \
            --buildtype=${{ matrix.variant }} \
            -DSRAL_DEV_SANITIZERS=${{ matrix.variant == 'debug' }} \
            -Ddefault_library=static \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=false \
            -DTARGET_IOS=true \
            -DSRAL_WITH_VOICEOVER=true \
            -DSRAL_WITH_AVSPEECH=true \
            -DSRAL_WITH_NSSPEECH=false
          meson compile -C build-device-${{ matrix.variant }}

      - name: Configure and Compile iOS Simulator Targets
        run: |
          set -euo pipefail
          meson setup build-sim-arm64-${{ matrix.variant }} --cross-file ios_sim_arm64_cross.txt \
            --buildtype=${{ matrix.variant }} \
            -DSRAL_DEV_SANITIZERS=${{ matrix.variant == 'debug' }} \
            -Ddefault_library=static \
            -Dwerror=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=false \
            -DTARGET_IOS=true \
            -DSRAL_WITH_VOICEOVER=true \
            -DSRAL_WITH_AVSPEECH=true \
            -DSRAL_WITH_NSSPEECH=false
          meson compile -C build-sim-arm64-${{ matrix.variant }}

          meson setup build-sim-x86_64-${{ matrix.variant }} --cross-file ios_sim_x86_64_cross.txt \
            --buildtype=${{ matrix.variant }} \
            -DSRAL_DEV_SANITIZERS=${{ matrix.variant == 'debug' }} \
            -Ddefault_library=static \
            -Dwerror=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=false \
            -DTARGET_IOS=true \
            -DSRAL_WITH_VOICEOVER=true \
            -DSRAL_WITH_AVSPEECH=true \
            -DSRAL_WITH_NSSPEECH=false
          meson compile -C build-sim-x86_64-${{ matrix.variant }}
      
      - name: Assemble Apple XCFramework Architecture Staging Bundle
        env:
          RELEASE_TOKEN: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          
          DEVICE_LIB=$(find build-device-${{ matrix.variant }} -name 'libSRAL.a' | head -n1)
          SIM_ARM64_LIB=$(find build-sim-arm64-${{ matrix.variant }} -name 'libSRAL.a' | head -n1)
          SIM_X86_64_LIB=$(find build-sim-x86_64-${{ matrix.variant }} -name 'libSRAL.a' | head -n1)
          
          if [ -z "${DEVICE_LIB}" ] || [ -z "${SIM_ARM64_LIB}" ] || [ -z "${SIM_X86_64_LIB}" ]; then
            echo "::error::Structural Compilation Failure: Required static libraries are missing." >&2
            exit 1
          fi
          
          VERSION_TOKEN="${RELEASE_TOKEN:-raw}"
          STAGING_DIR="${{ github.workspace }}/dist-ios-${VERSION_TOKEN}-${{ matrix.variant }}"
          rm -rf "${STAGING_DIR}"
          
          mkdir -p "${STAGING_DIR}/headers"
          mkdir -p "${STAGING_DIR}/lib-device"
          mkdir -p "${STAGING_DIR}/lib-sim"
          
          cp -f Include/SRAL.h "${STAGING_DIR}/headers/"
          cp -f Include/Sral.hpp "${STAGING_DIR}/headers/"
          
          cp -f "${DEVICE_LIB}" "${STAGING_DIR}/lib-device/libSRAL.a"
          
          lipo -create "${SIM_ARM64_LIB}" "${SIM_X86_64_LIB}" -output "${STAGING_DIR}/lib-sim/libSRAL.a"
          
          xcodebuild -create-xcframework \
            -library "${STAGING_DIR}/lib-device/libSRAL.a" -headers "${STAGING_DIR}/headers" \
            -library "${STAGING_DIR}/lib-sim/libSRAL.a" -headers "${STAGING_DIR}/headers" \
            -output "${STAGING_DIR}/SRAL.xcframework"
          
          rm -rf "${STAGING_DIR}/headers" "${STAGING_DIR}/lib-device" "${STAGING_DIR}/lib-sim"

      - name: Archive Hardened iOS XCFramework Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-ios-${{ matrix.variant }}-${{ inputs.release_version || 'raw' }}
          path: "${{ github.workspace }}/dist-ios-*"
          if-no-files-found: error