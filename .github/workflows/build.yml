name: Build
on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-Stable'
      - '[0-9]+.[0-9]+.[0-9]+-RC'
      - '[0-9]+.[0-9]+.[0-9]+-Beta'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
  workflow_dispatch:
  workflow_call:
    inputs:
      release_version:
        description: 'Dynamic version passed from release workflow'
        required: false
        type: string
        default: ''

permissions: {}

concurrency:
  group: build-${{ github.ref }}-${{ inputs.release_version || github.sha }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_call' }}

jobs:
  desktop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: windows-latest
            name: windows-x64
          - os: macos-latest
            name: macos-universal
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r <(echo "pip==26.1.2 --hash=sha256:773ec99aa5673ec54cb6a38612143a53be416298539050085a2d67aae4ec52b6")

          pip install --require-hashes -r <(cat << 'EOF'
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:2210db842106cf35f08836ffc8413159045b73fe01b697332213797669d031e4
          EOF
          )

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -y
          sudo -E apt-get install -y --no-install-recommends \
            libspeechd-dev libdbus-1-dev libatspi2-dev brltty libbrlapi-dev

      - name: Configure Project (Meson)
        shell: bash
        run: |
          set -euo pipefail
          meson setup builddir \
            --buildtype=release \
            --prefix="/" \
            -Ddefault_library=both \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false
      
      - name: Print Hidden Meson Log on Failure
        if: failure() || always()
        run: |
          echo "=== DUMPING INTERNAL MESON LOG ==="
          if [ -f "builddir/meson-logs/meson-log.txt" ]; then
            cat builddir/meson-logs/meson-log.txt
          else
            echo "builddir/meson-logs/meson-log.txt not found!" break;
          fi

      - name: Compile and Link Targets
        shell: bash
        run: |
          set -euo pipefail
          meson compile -C builddir

      - name: Install into staging tree
        shell: bash
        run: |
          set -euo pipefail
          meson install -C builddir --destdir ../dist

      - name: Archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-${{ matrix.name }}
          path: "${{ github.workspace }}/dist"
          if-no-files-found: error
          
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
            meson_cpu: aarch64
          - abi: x86_64
            arch: x86_64
            meson_cpu: x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r <(echo "pip==26.1.2 --hash=sha256:773ec99aa5673ec54cb6a38612143a53be416298539050085a2d67aae4ec52b6")

          pip install --require-hashes -r <(cat << 'EOF'
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:2210db842106cf35f08836ffc8413159045b73fe01b697332213797669d031e4
          EOF
          )

      - name: Set up JetBrains Runtime JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'jetbrains'
          java-version: '25'
      
      - name: Set up Base Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Native Linux Android NDK (r25)
        uses: nttld/setup-ndk@v1.5.0
        id: setup-ndk
        with:
          ndk-version: r25c
          link-to-sdk: true

      - name: Create Android Cross File Dynamically
        env:
          SECRET_NDK: ${{ secrets.ANDROID_NDK_HOME }}
          ARCH: ${{ matrix.arch }}
          MESON_CPU: ${{ matrix.meson_cpu }}
        shell: bash
        run: |
          set -euo pipefail
          
          TARGET_NDK="${SECRET_NDK:-${ANDROID_NDK_ROOT:-${ANDROID_NDK_HOME:-}}}"
          
          if [ -z "$TARGET_NDK" ]; then
            if [ -d "/usr/local/lib/android/sdk/ndk-bundle" ]; then
              TARGET_NDK="/usr/local/lib/android/sdk/ndk-bundle"
            else
              FOUND_NDK=$(find /usr/local/lib/android/sdk/ndk -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -n 1 || true)
              TARGET_NDK="${FOUND_NDK:-}"
            fi
          fi
          
          if [ -z "$TARGET_NDK" ] || [ ! -d "$TARGET_NDK" ]; then
            echo "::error::Failed to locate an active Android NDK Toolchain Environment directory context."
            exit 1
          fi
          
          echo "Using Android NDK Toolchain located at: $TARGET_NDK"
          
          if [ -d "$TARGET_NDK/toolchains/llvm/prebuilt/windows-x86_64" ]; then
            HOST_PLATFORM="windows-x86_64"
          else
            HOST_PLATFORM="linux-x86_64"
          fi
          
          echo "Detected NDK Host Sub-Architecture Layout: $HOST_PLATFORM"
          
          if [ "$ARCH" = "aarch64" ]; then
            CLANG_TRIPLE="aarch64-linux-android24"
          else
            CLANG_TRIPLE="x86_64-linux-android24"
          fi

          cat << EOF > android_cross.txt
          [binaries]
          c     = '$TARGET_NDK/toolchains/llvm/prebuilt/$HOST_PLATFORM/bin/clang'
          cpp   = '$TARGET_NDK/toolchains/llvm/prebuilt/$HOST_PLATFORM/bin/clang++'
          ar    = '$TARGET_NDK/toolchains/llvm/prebuilt/$HOST_PLATFORM/bin/llvm-ar'
          strip = '$TARGET_NDK/toolchains/llvm/prebuilt/$HOST_PLATFORM/bin/llvm-strip'

          [built-in options]
          c_args   = ['-target', '$CLANG_TRIPLE']
          cpp_args = ['-target', '$CLANG_TRIPLE']

          [host_machine]
          system     = 'android'
          cpu_family = '$MESON_CPU'
          cpu        = '$ARCH'
          endian     = 'little'
          EOF

      - name: Configure Android Target
        shell: bash
        run: |
          set -euo pipefail
          rm -rf builddir
          # Fixed the trailing backslash syntax error
          meson setup builddir --cross-file android_cross.txt \
            --buildtype=release \
            -Ddefault_library=both

      - name: Compile Target Shared Libraries
        shell: bash
        run: |
          set -euo pipefail
          meson compile -C builddir

      - name: Install ABI targets into staging structure
        env:
          ABI: ${{ matrix.abi }}
        shell: bash
        run: |
          set -euo pipefail
          STAGING_DIR="${{ github.workspace }}/dist-android-${ABI}"
          mkdir -p "$STAGING_DIR/lib/$ABI" "$STAGING_DIR/include" "$STAGING_DIR/java"
          
          find builddir \( -name 'libSRAL.so' -o -name 'libSRAL.a' \) -exec cp {} "$STAGING_DIR/lib/$ABI/" \;
          
          H_DIR="Include"
          if [ ! -d "$H_DIR" ] && [ -d "include" ]; then
            H_DIR="include"
          fi
          
          if [ -d "$H_DIR" ]; then
            cp "$H_DIR/SRAL.h" "$H_DIR/Sral.hpp" "$STAGING_DIR/include/"
          fi
          
          if [ -f "Dep/AndroidTTSHelper.java" ]; then
            cp Dep/AndroidTTSHelper.java Dep/AndroidAccessibilityManagerHelper.java "$STAGING_DIR/java/"
          fi

      - name: Archive Android artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-android-${{ matrix.abi }}
          path: "${{ github.workspace }}/dist-android-${{ matrix.abi }}"
          if-no-files-found: error

  webassembly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Emscripten Toolchain
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 6.0.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r <(echo "pip==26.1.2 --hash=sha256:773ec99aa5673ec54cb6a38612143a53be416298539050085a2d67aae4ec52b6")

          pip install --require-hashes -r <(cat << 'EOF'
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:2210db842106cf35f08836ffc8413159045b73fe01b697332213797669d031e4
          EOF
          )

      - name: Create WebAssembly Cross File
        shell: bash
        run: |
          set -euo pipefail
          cat << 'EOF' > emscripten_cross.txt
          [binaries]
          c = 'emcc'
          cpp = 'em++'
          ar = 'emar'
          strip = 'emstrip'

          [host_machine]
          system = 'emscripten'
          cpu_family = 'wasm32'
          cpu = 'wasm32'
          endian = 'little'
          EOF

      - name: Configure WebAssembly Cross Compilation Pass
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$EMSDK/emsdk_env.sh" ]; then
            source "$EMSDK/emsdk_env.sh"
          fi

          meson setup builddir --cross-file emscripten_cross.txt \
            --buildtype=release \
            --prefix="" \
            -Dwebassembly=true \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false

      - name: Compile Static Object Graph
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$EMSDK/emsdk_env.sh" ]; then
            source "$EMSDK/emsdk_env.sh"
          fi
          meson compile -C builddir
  
      - name: Install into staging tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/dist-wasm"
          meson install -C builddir --destdir "${{ github.workspace }}/dist-wasm"

      - name: Archive WebAssembly artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-wasm
          path: "${{ github.workspace }}/dist-wasm"
          if-no-files-found: error

  ios:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
 
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r <(echo "pip==26.1.2 --hash=sha256:773ec99aa5673ec54cb6a38612143a53be416298539050085a2d67aae4ec52b6")

          pip install --require-hashes -r <(cat << 'EOF'
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:2210db842106cf35f08836ffc8413159045b73fe01b697332213797669d031e4
          EOF
          )

      - name: Create iOS Hardware Device Cross File
        shell: bash
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          if [ -z "${SDK_PATH}" ] || [ ! -d "${SDK_PATH}" ]; then
            echo "::error::iPhoneOS System Platform SDK root directory environment context resolving context failed."
            exit 1
          fi

          cat << 'EOF' > ios_device_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '@SDK_PATH@', '-arch', 'arm64', '-miphoneos-version-min=15.0']
          cpp = ['clang++', '-isysroot', '@SDK_PATH@', '-arch', 'arm64', '-miphoneos-version-min=15.0']
          ar = 'ar'
          strip = 'strip'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

          sed -i "" "s|@SDK_PATH@|${SDK_PATH}|g" ios_device_cross.txt

      - name: Create iOS Simulator ARM64 Cross File
        shell: bash
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          if [ -z "${SDK_PATH}" ] || [ ! -d "${SDK_PATH}" ]; then
            echo "::error::iPhoneSimulator SDK root environment resolution execution block context tracking failed."
            exit 1
          fi

          cat << 'EOF' > ios_sim_arm64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '@SDK_PATH@', '-target', 'arm64-apple-ios15.0-simulator']
          cpp = ['clang++', '-isysroot', '@SDK_PATH@', '-target', 'arm64-apple-ios15.0-simulator']
          ar = 'ar'
          strip = 'strip'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

          sed -i "" "s|@SDK_PATH@|${SDK_PATH}|g" ios_sim_arm64_cross.txt

      - name: Create iOS Simulator X86_64 Cross File
        shell: bash
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          if [ -z "${SDK_PATH}" ] || [ ! -d "${SDK_PATH}" ]; then
            echo "::error::iPhoneSimulator X86_64 target SDK platform verification pipeline mapping context failed."
            exit 1
          fi

          cat << 'EOF' > ios_sim_x86_64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '@SDK_PATH@', '-target', 'x86_64-apple-ios15.0-simulator']
          cpp = ['clang++', '-isysroot', '@SDK_PATH@', '-target', 'x86_64-apple-ios15.0-simulator']
          ar = 'ar'
          strip = 'strip'

          [host_machine]
          system = 'darwin'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF

          sed -i "" "s|@SDK_PATH@|${SDK_PATH}|g" ios_sim_x86_64_cross.txt

      - name: Configure and Compile iOS Device Target
        shell: bash
        run: |
          set -euo pipefail
          meson setup build-device --cross-file ios_device_cross.txt \
            --buildtype=release \
            -Ddefault_library=static \
            -DTARGET_IOS=true \
            -DSRAL_WITH_NSSPEECH=false \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false
          meson compile -C build-device

      - name: Configure and Compile iOS Simulator Targets
        shell: bash
        run: |
          set -euo pipefail
          meson setup build-sim-arm64 --cross-file ios_sim_arm64_cross.txt \
            --buildtype=debug \
            -Ddefault_library=static \
            -DTARGET_IOS=true \
            -DSRAL_WITH_NSSPEECH=false \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false
          meson compile -C build-sim-arm64

          meson setup build-sim-x86_64 --cross-file ios_sim_x86_64_cross.txt \
            --buildtype=debug \
            -Ddefault_library=static \
            -DTARGET_IOS=true \
            -DSRAL_WITH_NSSPEECH=false \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false
          meson compile -C build-sim-x86_64

      - name: Assemble Apple XCFramework Architecture Staging Bundle
        shell: bash
        run: |
          set -euo pipefail
          DEVICE_LIB=$(find build-device -name 'libSRAL.a' | head -n1)
          SIM_ARM64_LIB=$(find build-sim-arm64 -name 'libSRAL.a' | head -n1)
          SIM_X86_64_LIB=$(find build-sim-x86_64 -name 'libSRAL.a' | head -n1)
          
          if [ -z "${DEVICE_LIB}" ] || [ -z "${SIM_ARM64_LIB}" ] || [ -z "${SIM_X86_64_LIB}" ]; then
            echo "Structural Compilation Failure: Required matrix build dependencies missing." >&2
            exit 1
          fi
          
          VERSION_TOKEN="${{ inputs.release_version }}"
          VERSION_TOKEN="${VERSION_TOKEN:-raw}"
          
          STAGING_DIR="${{ github.workspace }}/dist-ios-${VERSION_TOKEN}"
          rm -rf "${STAGING_DIR}"
          mkdir -p "${STAGING_DIR}/framework/headers-device" "${STAGING_DIR}/framework/headers-sim" "${STAGING_DIR}/framework/intermediate"
          
          lipo -create "${SIM_ARM64_LIB}" "${SIM_X86_64_LIB}" -output "${STAGING_DIR}/framework/intermediate/libSRAL_sim.a"
          
          H_DIR="Include"
          if [ ! -d "${H_DIR}" ] && [ -d "include" ]; then
            H_DIR="include"
          fi
          
          cp "${H_DIR}/SRAL.h" "${H_DIR}/Sral.hpp" "${STAGING_DIR}/framework/headers-device/"
          cp "${H_DIR}/SRAL.h" "${H_DIR}/Sral.hpp" "${STAGING_DIR}/framework/headers-sim/"
          
          find "${STAGING_DIR}/framework/headers-device" "${STAGING_DIR}/framework/headers-sim" -name ".*" -delete 2>/dev/null || true
          
          xcodebuild -create-xcframework \
            -library "${DEVICE_LIB}" -headers "${STAGING_DIR}/framework/headers-device" \
            -library "${STAGING_DIR}/framework/intermediate/libSRAL_sim.a" -headers "${STAGING_DIR}/framework/headers-sim" \
            -output "${STAGING_DIR}/SRAL.xcframework"
            
          rm -rf "${STAGING_DIR}/framework"

      - name: Archive iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-ios
          path: "${{ github.workspace }}/dist-ios-${{ inputs.release_version || 'raw' }}"
          if-no-files-found: error
