name: Build
on:
  push:
    branches:
      - main
    tags:
      - '*-Stable'
      - '*-RC'
      - '*-Beta'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      release_version:
        description: 'Dynamic version passed from release workflow'
        required: false
        type: string
        default: ''

permissions: read-all

concurrency:
  group: build-${{ github.ref }}-${{ inputs.release_version || github.sha }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_call' }}

jobs:
  desktop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: windows-latest
            name: windows-x64
          - os: macos-latest
            name: macos-universal
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes meson==1.11.1 ninja==1.13.0 || pip install meson ninja

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libspeechd-dev libdbus-1-dev libatspi-dev brltty libbrlapi-dev

      - name: Configure Project (Meson)
        shell: bash
        run: |
          meson setup builddir \
            --buildtype=release \
            --prefix="" \
            -Ddefault_library=both \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false

      - name: Compile and Link Targets
        shell: bash
        run: meson compile -C builddir

      - name: Install into staging tree
        shell: bash
        run: |
          meson install -C builddir --destdir ../dist

      - name: Archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-${{ matrix.name }}
          path: "${{ github.workspace }}/dist"
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            arch: aarch64
          - abi: x86_64
            arch: x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install meson==1.11.1 ninja==1.13.0 || pip install meson ninja

      - name: Set up JetBrains Runtime JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'jetbrains'
          java-version: '25'

      - name: Create Android Cross File Dynamically
        env:
          NDK: ${{ secrets.ANDROID_NDK_HOME || env.ANDROID_NDK_LATEST_HOME }}
          ARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          if [ -z "$NDK" ]; then
            echo "::error::Failed to locate an active Android NDK Toolchain Environment."
            exit 1
          fi
          
          cat <<EOF > android_cross.txt
          [binaries]
          c = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/$ARCH-linux-android24-clang'
          cpp = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/$ARCH-linux-android24-clang++'
          ar = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'

          [host_machine]
          system = 'android'
          cpu_family = '$ARCH'
          cpu = '$ARCH'
          endian = 'little'
          EOF

      - name: Configure Android Target
        shell: bash
        run: |
          meson setup builddir --cross-file android_cross.txt \
            --buildtype=release \
            -Ddefault_library=both \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false

      - name: Compile Target Shared Libraries
        shell: bash
        run: meson compile -C builddir

      - name: Install ABI targets into staging structure
        env:
          ABI: ${{ matrix.abi }}
        shell: bash
        run: |
          STAGING_DIR="${{ github.workspace }}/dist-android-$ABI"
          mkdir -p "$STAGING_DIR/lib/$ABI" "$STAGING_DIR/include" "$STAGING_DIR/java"
          
          find builddir \( -name 'libSRAL.so' -o -name 'libSRAL.a' \) -exec cp {} "$STAGING_DIR/lib/$ABI/" \;
          
          H_DIR="Include"
          if [ ! -d "$H_DIR" ] && [ -d "include" ]; then
            H_DIR="include"
          fi
          
          if [ -d "$H_DIR" ]; then
            cp "$H_DIR/SRAL.h" "$H_DIR/Sral.hpp" "$STAGING_DIR/include/"
          fi
          
          if [ -f "Dep/AndroidTTSHelper.java" ]; then
            cp Dep/AndroidTTSHelper.java Dep/AndroidAccessibilityManagerHelper.java "$STAGING_DIR/java/"
          fi

      - name: Archive Android artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-android-${{ matrix.abi }}
          path: "${{ github.workspace }}/dist-android-${{ matrix.abi }}"
          if-no-files-found: error

  webassembly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Emscripten Toolchain
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 6.0.2
          no-node: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install meson==1.11.1 ninja==1.13.0 || pip install meson ninja

      - name: Create WebAssembly Cross File
        shell: bash
        run: |
          cat <<EOF > emscripten_cross.txt
          [binaries]
          c = 'emcc'
          cpp = 'em++'
          ar = 'emar'
          strip = 'emstrip'

          [host_machine]
          system = 'emscripten'
          cpu_family = 'wasm32'
          cpu = 'wasm32'
          endian = 'little'
          EOF

      - name: Configure WebAssembly Cross Compilation Pass
        shell: bash
        run: |
          if [ -f "$EMSDK/emsdk_env.sh" ]; then
            source "$EMSDK/emsdk_env.sh"
          fi

          meson setup builddir --cross-file emscripten_cross.txt \
            --buildtype=release \
            --prefix="" \
            -Dwebassembly=true \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false

      - name: Compile Static Object Graph
        shell: bash
        run: |
          if [ -f "$EMSDK/emsdk_env.sh" ]; then
            source "$EMSDK/emsdk_env.sh"
          fi
          meson compile -C builddir
  
      - name: Install into staging tree
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/dist-wasm"
          meson install -C builddir --destdir "${{ github.workspace }}/dist-wasm"

      - name: Archive WebAssembly artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-wasm
          path: "${{ github.workspace }}/dist-wasm"
          if-no-files-found: error

  ios:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'

      - name: Install Meson and Ninja
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install meson==1.11.1 ninja==1.13.0 || pip install meson ninja

      - name: Create iOS Hardware Device Cross File
        shell: bash
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          cat <<EOF > ios_device_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-arch', 'arm64', '-miphoneos-version-min=15.0']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-arch', 'arm64', '-miphoneos-version-min=15.0']
          ar = 'ar'
          strip = 'strip'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

      - name: Create iOS Simulator ARM64 Cross File
        shell: bash
        run: |
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          cat <<EOF > ios_sim_arm64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-target', 'arm64-apple-ios15.0-simulator']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-target', 'arm64-apple-ios15.0-simulator']
          ar = 'ar'
          strip = 'strip'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

      - name: Create iOS Simulator X86_64 Cross File
        shell: bash
        run: |
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          cat <<EOF > ios_sim_x86_64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-target', 'x86_64-apple-ios15.0-simulator']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-target', 'x86_64-apple-ios15.0-simulator']
          ar = 'ar'
          strip = 'strip'

          [host_machine]
          system = 'darwin'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF

      - name: Configure and Compile iOS Device Target
        shell: bash
        run: |
          meson setup build-device --cross-file ios_device_cross.txt \
            --buildtype=release \
            -Ddefault_library=static \
            -DTARGET_IOS=true \
            -DSRAL_WITH_NSSPEECH=false \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false
          meson compile -C build-device

      - name: Configure and Compile iOS Simulator Targets
        shell: bash
        run: |
          meson setup build-sim-arm64 --cross-file ios_sim_arm64_cross.txt \
            --buildtype=debug \
            -Ddefault_library=static \
            -DTARGET_IOS=true \
            -DSRAL_WITH_NSSPEECH=false \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false
          meson compile -C build-sim-arm64

          meson setup build-sim-x86_64 --cross-file ios_sim_x86_64_cross.txt \
            --buildtype=debug \
            -Ddefault_library=static \
            -DTARGET_IOS=true \
            -DSRAL_WITH_NSSPEECH=false \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false
          meson compile -C build-sim-x86_64

      - name: Assemble Apple XCFramework Architecture Staging Bundle
        shell: bash
        run: |
          DEVICE_LIB=$(find build-device -name 'libSRAL.a' | head -n1)
          SIM_ARM64_LIB=$(find build-sim-arm64 -name 'libSRAL.a' | head -n1)
          SIM_X86_64_LIB=$(find build-sim-x86_64 -name 'libSRAL.a' | head -n1)
          
          if [ -z "$DEVICE_LIB" ] || [ -z "$SIM_ARM64_LIB" ] || [ -z "$SIM_X86_64_LIB" ]; then
            echo "Structural Compilation Failure: Required matrix build dependencies missing." >&2
            exit 1
          fi
          
          # Match Android style by outputting directly into the dynamic layout path root
          STAGING_DIR="${{ github.workspace }}/dist-ios-${{ inputs.release_version || 'raw' }}"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR/framework/headers-device" "$STAGING_DIR/framework/headers-sim" "$STAGING_DIR/framework/intermediate"
          
          lipo -create "$SIM_ARM64_LIB" "$SIM_X86_64_LIB" -output "$STAGING_DIR/framework/intermediate/libSRAL_sim.a"
          
          H_DIR="Include"
          if [ ! -d "$H_DIR" ] && [ -d "include" ]; then
            H_DIR="include"
          fi
          
          cp "$H_DIR/SRAL.h" "$H_DIR/Sral.hpp" "$STAGING_DIR/framework/headers-device/"
          cp "$H_DIR/SRAL.h" "$H_DIR/Sral.hpp" "$STAGING_DIR/framework/headers-sim/"
          
          find "$STAGING_DIR/framework/headers-device" "$STAGING_DIR/framework/headers-sim" -name ".*" -delete 2>/dev/null || true
          
          xcodebuild -create-xcframework \
            -library "$DEVICE_LIB" -headers "$STAGING_DIR/framework/headers-device" \
            -library "$STAGING_DIR/framework/intermediate/libSRAL_sim.a" -headers "$STAGING_DIR/framework/headers-sim" \
            -output "$STAGING_DIR/SRAL.xcframework"
            
          rm -rf "$STAGING_DIR/framework"

      - name: Archive iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-ios
          path: "${{ github.workspace }}/dist-ios-${{ inputs.release_version || 'raw' }}"
          if-no-files-found: error
