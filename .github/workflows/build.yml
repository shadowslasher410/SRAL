name: Build

on:
  push:
    branches:
      - main
    tags:
      - '*-Stable'
      - '*-RC'
      - '*-Beta'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      release_version:
        description: 'Dynamic version passed from release workflow'
        required: false
        type: string
        default: ''

permissions: {}

concurrency:
  group: build-${{ github.ref }}-${{ github.event.inputs.release_version || github.sha }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_call' }}

jobs:
  desktop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            preset: linux-gcc-release
          - os: windows-latest
            name: windows-x64
            preset: msvc-x64-release
          - os: macos-latest
            name: macos-universal
            preset: macos-release
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get CMake
        uses: lukka/get-cmake@ea83089aa35e08e459464341fe24ad024ee2466f # v4.3.1

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          DEPS="ninja-build"
          CONFIG_FILE="CMake/SRALConfig.cmake"
          
          if [ -f "$CONFIG_FILE" ]; then
            echo "Parsing safety validated dependencies configuration layout..."
            MODULES=$(grep -oP '(?<=_SRAL_REQUIRED_MODULES ")[^"]+' "$CONFIG_FILE" || true)
            for MODULE in $MODULES; do
              case "$MODULE" in
                "speech-dispatcher") DEPS="$DEPS libspeechd-dev" ;;
                "dbus-1")            DEPS="$DEPS libdbus-1-dev" ;;
                "atspi-2")           DEPS="$DEPS libatspi-dev" ;;
                "brlapi"|"brltty")   DEPS="$DEPS brltty libbrlapi-dev" ;;
                *) echo "Warning: Unknown dependency '$MODULE' passed via file parser module loop." ;;
              esac
            done
          else
            echo "Critical Fallback: Expected file missing. Using restrictive standard platform dependencies package set."
            DEPS="$DEPS libspeechd-dev libx11-dev brltty libbrlapi-dev libatspi-dev"
          fi
          sudo apt-get install -y --no-install-recommends $DEPS

      - name: Run CMake via Presets
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        env:
          SRAL_INJECTED_VER: ${{ inputs.release_version || github.ref_name || github.sha }}
        with:
          configurePreset: ${{ matrix.preset }}
          buildPreset: '${{ matrix.preset }}-build'
          configurePresetAdditionalArgs: '["-BUILD_SHARED_LIBS=ON", "-DBUILD_SRAL_TEST=OFF", "-DSRAL_VERSION=${{ env.SRAL_INJECTED_VER }}"]'

      - name: Install into staging tree
        run: cmake --install out/build/${{ matrix.preset }} --config Release --prefix dist

      - name: Archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-${{ matrix.name }}
          path: dist
          if-no-files-found: error

   android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            preset: android-arm64-release
          - abi: x86_64
            preset: android-x86_64-release
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Ninja Build System
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build

      - name: Resolve Android NDK Path Fallback
        run: |
          if [ -n "${{ secrets.ANDROID_NDK_HOME }}" ]; then
            echo "ANDROID_NDK_HOME=${{ secrets.ANDROID_NDK_HOME }}" >> $GITHUB_ENV
          else
            echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          fi

      - name: Get CMake
        uses: lukka/get-cmake@ea83089aa35e08e459464341fe24ad024ee2466f # v4.3.1

      - name: Set up JetBrains Runtime JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'jetbrains'
          java-version: '25'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
             
      - name: Run CMake via Presets
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        env:
          SRAL_INJECTED_VER: ${{ inputs.release_version || github.ref_name || github.sha }}
        with:
          configurePreset: ${{ matrix.preset }}
          buildPreset: '${{ matrix.preset }}-build'
          configurePresetAdditionalArgs: '["-BUILD_SHARED_LIBS=ON", "-DBUILD_SRAL_TEST=OFF", "-DSRAL_VERSION=${{ env.SRAL_INJECTED_VER }}"]'

      - name: Install ABI targets into staging structure
        run: |
          mkdir -p "dist-${{ matrix.abi }}/lib/${{ matrix.abi }}" "dist-${{ matrix.abi }}/include" "dist-${{ matrix.abi }}/java"
          cmake --install "out/build/${{ matrix.preset }}" --config Release --prefix "dist-${{ matrix.abi }}/install"
          
          find "out/build/${{ matrix.preset }}" \( -name 'libSRAL.so' -o -name 'libSRAL_static.a' \) -exec cp {} "dist-${{ matrix.abi }}/lib/${{ matrix.abi }}/" \;
          cp Include/SRAL.h Include/Sral.hpp "dist-${{ matrix.abi }}/include/"
          cp Dep/AndroidTTSHelper.java Dep/AndroidAccessibilityManagerHelper.java "dist-${{ matrix.abi }}/java/"

      - name: Archive Android artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-android-${{ matrix.abi }}
          path: dist-${{ matrix.abi }}
          if-no-files-found: error

  webassembly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Emscripten Toolchain
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16

      - name: Get CMake
        uses: lukka/get-cmake@ea83089aa35e08e459464341fe24ad024ee2466f # v4.3.1

      - name: Run CMake via WebAssembly Presets
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        env:
          SRAL_INJECTED_VER: ${{ inputs.release_version || github.ref_name || github.sha }}
        with:
          configurePreset: wasm-release
          buildPreset: wasm-release-build
          configurePresetAdditionalArgs: '["-BUILD_SHARED_LIBS=OFF", "-DBUILD_SRAL_TEST=OFF", "-DSRAL_VERSION=${{ env.SRAL_INJECTED_VER }}"]'

      - name: Install into staging tree
        run: cmake --install out/build/wasm-release --config Release --prefix dist

      - name: Archive WebAssembly artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-wasm
          path: dist
          if-no-files-found: error

  ios:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        
      - name: Get CMake
        uses: lukka/get-cmake@ea83089aa35e08e459464341fe24ad024ee2466f # v4.3.1
        
      - name: Run CMake for iOS Device
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        env:
          SRAL_INJECTED_VER: ${{ inputs.release_version || github.ref_name || github.sha }}
        with:
          configurePreset: ios-device-release
          buildPreset: ios-device-release-build
          configurePresetAdditionalArgs: '["-DSRAL_DISABLE_NSSPEECH=ON", "-DBUILD_SRAL_TEST=OFF", "-DBUILD_SHARED_LIBS=OFF", "-DSRAL_VERSION=${{ env.SRAL_INJECTED_VER }}"]'

      - name: Run CMake for iOS Simulator
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        env:
          SRAL_INJECTED_VER: ${{ inputs.release_version || github.ref_name || github.sha }}
        with:
          configurePreset: ios-simulator-debug
          buildPreset: ios-simulator-debug-build
          configurePresetAdditionalArgs: '["-DSRAL_DISABLE_NSSPEECH=ON", "-DBUILD_SRAL_TEST=OFF", "-DBUILD_SHARED_LIBS=OFF", "-DSRAL_VERSION=${{ env.SRAL_INJECTED_VER }}"]'

      - name: Assemble XCFramework
        run: |
          DEVICE_LIB=$(find out/build/ios-device-release -name 'libSRAL_static.a' | head -n1)
          SIM_LIB=$(find out/build/ios-simulator-debug -name 'libSRAL_static.a' | head -n1)
          if [ -z "$DEVICE_LIB" ] || [ -z "$SIM_LIB" ]; then
            echo "Security / Structural Compilation Failure: Required compilation dependencies missing." >&2
            exit 1
          fi
          mkdir -p headers-device headers-sim dist
          cp Include/SRAL.h Include/Sral.hpp headers-device/
          cp Include/SRAL.h Include/Sral.hpp headers-sim/
          
          xcodebuild -create-xcframework \
            -library "$DEVICE_LIB" -headers headers-device \
            -library "$SIM_LIB" -headers headers-sim \
            -output dist/SRAL.xcframework 

          cp Include/SRAL.h Include/Sral.hpp dist/SRAL.xcframework/

      - name: Archive iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-ios
          path: dist
          if-no-files-found: error
