name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-Stable'
      - '[0-9]+.[0-9]+.[0-9]+-RC'
      - '[0-9]+.[0-9]+.[0-9]+-Beta'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag/release name to publish (e.g. 1.0.0-Stable)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-quality-gates:
    uses: ./.github/workflows/build.yml
    with:
      release_version: ${{ github.event.inputs.version || github.ref_name }}
  release-windows:
    name: Windows Release
    needs: verify-quality-gates
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Visual Studio Developer Environment (Windows-Only)
        uses: mlocati/setup-msvc@ade6aff3df872d66c12a63dcacdddf0041cb2693 # v1.3.1
        with:
          architecture: x64

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Decode Authenticode PFX Cryptographic Certificate
        shell: powershell
        run: |
          $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.WIN_SIGNING_CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $pfxBytes)

      - name: Configure Production Release Options
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist"
        run: |
          meson setup builddir \
            --buildtype=release \
            --prefix="$WORKSPACE_PREFIX" \
            -Ddefault_library=both \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=true \
            -DSRAL_SIGN_OUTPUTS=true

      - name: Compile and Link Hardened Targets
        run: meson compile -C builddir

      - name: Cryptographically Sign and Install Binary Bundles
        run: meson install -C builddir

      - name: Purge Cryptographic Residual Materials from Disk Tree
        if: always()
        shell: powershell
        run: Remove-Item -Path "${{ github.workspace }}\cert.pfx" -Force -ErrorAction SilentlyContinue

      - name: Package Windows Artifact Bundle Archive
        shell: powershell
        run: Compress-Archive -Path dist/* -DestinationPath SRAL-Windows-Desktop.zip

      - name: Deploy Windows Package Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: SRAL-Windows-Desktop.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    name: Linux Release
    needs: verify-quality-gates
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Cache Linux System APT Development Packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-dev-packages-${{ hashFiles('**/meson.build') }}
          restore-keys: |
            ${{ runner.os }}-apt-dev-packages-

      - name: Install dependencies (Linux System Headers)
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt-get update -y
          sudo -E apt-get install -y --no-install-recommends \
            libspeechd-dev libdbus-1-dev libatspi2-dev brltty libbrlapi-dev

      - name: Configure Production Release Options
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist"
        run: |
          set -euo pipefail
          meson setup builddir \
            --buildtype=release \
            --prefix="$WORKSPACE_PREFIX" \
            -Ddefault_library=both \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=true \
            -DSRAL_INSTALL_BINDING_SOURCES=true

      - name: Compile and Link Hardened Targets
        run: |
          set -euo pipefail
          meson compile -C builddir

      - name: Install Into Production Staging Tree
        run: |
          set -euo pipefail
          meson install -C builddir

      - name: Package Linux Production Archive
        run: |
          set -euo pipefail
          tar -czvf SRAL-Linux-Desktop.tar.gz -C dist .

      - name: Deploy Linux Package Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: SRAL-Linux-Desktop.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-apple:
    name: macOS Release
    needs: verify-quality-gates
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Populate Temporary Volatile Apple Keychain Context
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > c.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          security import c.p12 -k $KEYCHAIN_PATH -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" $KEYCHAIN_PATH
          rm c.p12

      - name: Configure and Compile Signed macOS Desktop Libraries
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist"
        run: |
          set -euo pipefail
          meson setup builddir \
            --buildtype=release \
            --prefix="$WORKSPACE_PREFIX" \
            -Ddefault_library=both \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=true \
            -DSRAL_SIGN_OUTPUTS=true \
            -DAPPLE_SIGNING_IDENTITY="${{ secrets.APPLE_DEVELOPER_ID }}"
          meson compile -C builddir
          meson install -C builddir

      - name: Notarize macOS Binary Package Bundle (Gatekeeper Cloud Audit Sweep)
        run: |
          set -euo pipefail
          ditto -c -k --keepParent dist/lib/libSRAL.dylib SRAL_Apple_Artifact.zip
          xcrun notarytool submit SRAL_Apple_Artifact.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait

      - name: Deploy macOS Package Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: SRAL_Apple_Artifact.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-android:
    name: Android Release
    needs: verify-quality-gates
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Set up JetBrains Runtime JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v4.5.0
        with:
          distribution: 'jetbrains'
          java-version: '25'
      
      - name: Set up Base Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        env:
          ACCEPT_ANDROID_SDK_LICENSES: 'true'

      - name: Set up Native Linux Android NDK (r27)
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: setup-ndk
        with:
          ndk-version: r27c
          link-to-sdk: true

      - name: Create Android ARM64 Production Cross File
        run: |
          set -euo pipefail
          TARGET_NDK="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN_BIN="$TARGET_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          
          cat << EOF > android_cross_arm64.txt
          [binaries]
          c   = '$TOOLCHAIN_BIN/aarch64-linux-android21-clang'
          cpp = '$TOOLCHAIN_BIN/aarch64-linux-android21-clang++'
          ar  = '$TOOLCHAIN_BIN/llvm-ar'
          strip = '$TOOLCHAIN_BIN/llvm-strip'

          [properties]
          sys_root = '$TARGET_NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot'

          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'arm64-v8a'
          endian = 'little'
          EOF

      - name: Configure and Compile Production Android Release
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist-android"
        run: |
          set -euo pipefail
          meson setup builddir_android \
            --cross-file android_cross_arm64.txt \
            --buildtype=release \
            --prefix="$WORKSPACE_PREFIX" \
            -DSRAL_DEV_SANITIZERS=false \
            -DTARGET_ANDROID=true \
            -DVERSION_MINTARGET_ANDROID=21 \
            -DBUILD_TESTS=false \
            -DBUILD_BINDINGS=false \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true
          meson compile -C builddir_android
          meson install -C builddir_android

      - name: Extract and Sign Android Shared Object Binaries
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            TARGET_SO=$(find dist-android -name 'libSRAL.so' | head -n 1)
            echo "[SRAL SECURITY] Cryptographically embedding keystore attributes into ${TARGET_SO}..."
            jarsigner -keystore release.keystore -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" "$TARGET_SO" "$KEY_ALIAS"
            rm -f release.keystore
          else
            echo "[SRAL SECURITY WARNING] ANDROID_KEYSTORE_BASE64 missing. Leaving Android library unsigned."
          fi

      - name: Package Android Production Archive
        run: |
          set -euo pipefail
          tar -czvf SRAL-Android-ARM64.tar.gz -C dist-android .

      - name: Deploy Android Package Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: SRAL-Android-ARM64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-ios:
    name: iOS Release
    needs: verify-quality-gates
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Create iOS Hardware Device Cross File
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          cat << EOF > ios_device_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-arch', 'arm64', '-miphoneos-version-min=26.0']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-arch', 'arm64', '-miphoneos-version-min=26.0']
          ar = 'ar'
          strip = 'strip'
          [properties]
          c_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          cpp_args    = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          [host_machine]
          system = 'ios'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

      - name: Create iOS Simulator ARM64 Cross File
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          cat << EOF > ios_sim_arm64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-target', 'arm64-apple-ios26.0-simulator']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-target', 'arm64-apple-ios26.0-simulator']
          ar = 'ar'
          strip = 'strip'
          [properties]
          c_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          cpp_args    = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          [host_machine]
          system = 'ios'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'
          EOF

      - name: Create iOS Simulator X86_64 Cross File
        run: |
          set -euo pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          cat << EOF > ios_sim_x86_64_cross.txt
          [binaries]
          c = ['clang', '-isysroot', '$SDK_PATH', '-target', 'x86_64-apple-ios26.0-simulator']
          cpp = ['clang++', '-isysroot', '$SDK_PATH', '-target', 'x86_64-apple-ios26.0-simulator']
          ar = 'ar'
          strip = 'strip'
          [properties]
          c_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          cpp_args    = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror']
          [host_machine]
          system = 'ios'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF

      - name: Configure and Compile Production iOS Targets
        run: |
          set -euo pipefail
          
          meson setup build-device --cross-file ios_device_cross.txt \
            --buildtype=release -Ddefault_library=static -Dwerror=true -Db_lto=true \
            -Db_pie=true -Db_staticpic=true -DTARGET_DESKTOP=false -DTARGET_IOS=true \
            -DSRAL_WITH_VOICEOVER=true -DSRAL_WITH_AVSPEECH=true -DSRAL_WITH_NSSPEECH=false
          meson compile -C build-device

          meson setup build-sim-arm64 --cross-file ios_sim_arm64_cross.txt \
            --buildtype=release -Ddefault_library=static -Dwerror=true -Db_lto=true \
            -Db_pie=true -Db_staticpic=true -DTARGET_DESKTOP=false -DTARGET_IOS=true \
            -DSRAL_WITH_VOICEOVER=true -DSRAL_WITH_AVSPEECH=true -DSRAL_WITH_NSSPEECH=false
          meson compile -C build-sim-arm64

          meson setup build-sim-x86_64 --cross-file ios_sim_x86_64_cross.txt \
            --buildtype=release -Ddefault_library=static -Dwerror=true -Db_lto=true \
            -Db_pie=true -Db_staticpic=true -DTARGET_DESKTOP=false -DTARGET_IOS=true \
            -DSRAL_WITH_VOICEOVER=true -DSRAL_WITH_AVSPEECH=true -DSRAL_WITH_NSSPEECH=false
          meson compile -C build-sim-x86_64
      
      - name: Assemble Universal Apple XCFramework Bundle
        env:
          RELEASE_TOKEN: ${{ inputs.release_version }} 
        run: |
          set -euo pipefail
          
          DEVICE_LIB=$(find build-device -name 'libSRAL.a' | head -n1)
          SIM_ARM64_LIB=$(find build-sim-arm64 -name 'libSRAL.a' | head -n1)
          SIM_X86_64_LIB=$(find build-sim-x86_64 -name 'libSRAL.a' | head -n1)
          
          VERSION_TOKEN="${RELEASE_TOKEN:-raw}"
          STAGING_DIR="${{ github.workspace }}/dist-ios-${VERSION_TOKEN}"
          rm -rf "${STAGING_DIR}"
          
          mkdir -p "${STAGING_DIR}/headers"
          mkdir -p "${STAGING_DIR}/lib-device"
          mkdir -p "${STAGING_DIR}/lib-sim"
          
          cp -f Include/SRAL.h "${STAGING_DIR}/headers/"
          cp -f Include/Sral.hpp "${STAGING_DIR}/headers/"
          cp -f "${DEVICE_LIB}" "${STAGING_DIR}/lib-device/libSRAL.a"
          
          lipo -create "${SIM_ARM64_LIB}" "${SIM_X86_64_LIB}" -output "${STAGING_DIR}/lib-sim/libSRAL.a"
          
          xcodebuild -create-xcframework \
            -library "${STAGING_DIR}/lib-device/libSRAL.a" -headers "${STAGING_DIR}/headers" \
            -library "${STAGING_DIR}/lib-sim/libSRAL.a" -headers "${STAGING_DIR}/headers" \
            -output "${STAGING_DIR}/SRAL.xcframework"
          
          rm -rf "${STAGING_DIR}/headers" "${STAGING_DIR}/lib-device" "${STAGING_DIR}/lib-sim"
          zip -r SRAL-iOS-XCFramework.zip SRAL.xcframework

      - name: Deploy iOS Package Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: SRAL-iOS-XCFramework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-webassembly:
    name: WebAssembly Release
    needs: verify-quality-gates
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Emscripten Toolchain
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 6.0.2
          actions-cache-folder: 'emsdk-cache'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          set -euo pipefail
          cat << 'EOF' > requirements.txt
          pip==26.1.2 --hash=sha256:382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab --hash=sha256:f49cd134c61cf2fd75e0ce2676db03e4054504a5a4986d00f8299ae632dc4605
          meson==1.11.1 --hash=sha256:9b3a023657e393dbc5335b95c561337d49b7a458f5541e47ec44f2cc566e0d80
          ninja==1.13.0 --hash=sha256:4a40ce995ded54d9dc24f8ea37ff3bf62ad192b547f6c7126e7e25045e76f978
          ninja==1.13.0 --hash=sha256:fb46acf6b93b8dd0322adc3a4945452a4e774b75b91293bafcc7b7f8e6517dfa
          ninja==1.13.0 --hash=sha256:88998ef6e39893d9ce4c5531d044fa65239a5009f4e24cf74f9d51829e0618ff
          ninja==1.13.0 --hash=sha256:c221cb7fb9e57fca3cb5bb11f2a3a52f41e57c6ef5ef4c545de29ee6284f67b1
          ninja==1.13.0 --hash=sha256:1a847e923bbfa22552e18fa4e1577c44f29a500914cf24cf72b9a1829e1601ee
          EOF
          python -m pip install --require-hashes -r requirements.txt
          rm requirements.txt

      - name: Create WebAssembly Cross File
        run: |
          set -euo pipefail
          cat << 'EOF' > emscripten_cross.txt
          [binaries]
          c = 'emcc'
          cpp = 'em++'
          ar = 'emar'
          strip = 'emstrip'

          [properties]
          c_args        = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror', '-pthread', '-Qunused-arguments']
          cpp_args      = ['-fstack-protector-all', '-ftrivial-auto-var-init=zero', '-Werror', '-pthread', '-Qunused-arguments']
          c_link_args   = ['-pthread', '-sSTACK_OVERFLOW_CHECK=2', '-sASSERTIONS=1', '-sWASM_BIGINT']
          cpp_link_args = ['-pthread', '-sSTACK_OVERFLOW_CHECK=2', '-sASSERTIONS=1', '-sWASM_BIGINT']

          [host_machine]
          system = 'emscripten'
          cpu_family = 'wasm32'
          cpu = 'wasm32'
          endian = 'little'
          EOF

      - name: Configure WebAssembly Target
        env:
          WORKSPACE_PREFIX: "${{ github.workspace }}/dist-wasm"
        run: |
          set -euo pipefail
          source $EMSDK_NODE/../../emsdk_env.sh
          meson setup builddir_wasm \
            --cross-file emscripten_cross.txt \
            --buildtype=release \
            --prefix="$WORKSPACE_PREFIX" \
            -DSRAL_DEV_SANITIZERS=false \
            -Ddefault_library=static \
            -Dwerror=true \
            -Db_lto=true \
            -Db_pie=true \
            -Db_staticpic=true \
            -DTARGET_DESKTOP=false \
            -DTARGET_CHROMEVOX=true \
            -DSRAL_WITH_CHROMEVOX=true \
            -DSRAL_INSTALL_BINDING_SOURCES=true

      - name: Compile and Package Target WASM Objects
        run: |
          set -euo pipefail
          source $EMSDK_NODE/../../emsdk_env.sh
          meson compile -C builddir_wasm
          meson install -C builddir_wasm
          tar -czvf SRAL-WebAssembly.tar.gz -C dist-wasm .

      - name: Deploy WebAssembly Package Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: SRAL-WebAssembly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
