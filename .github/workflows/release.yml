name: Release

on:
  push:
    tags:
      - '*-Stable'
      - '*-RC'
      - '*-Beta'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag/release name to publish (e.g. 0.5-Stable)'
        required: true
        type: string
        
permissions: {}

concurrency:
  group: release-${{ github.ref_name }}-${{ github.event.inputs.version || github.sha }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

  run-build:
    needs: setup
    uses: ./.github/workflows/build.yml
    with:
      release_version: ${{ needs.setup.outputs.version }}

  release:
    needs: [setup, run-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      is_prerelease: ${{ steps.check-tag.outputs.is_prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Ensure git tag exists
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          if ! git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} does not exist. Creating it on current commit..."
            git tag "${VERSION}" "${{ github.sha }}"
            git push origin "${VERSION}"
          fi
      - name: Download all compiled matrix bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bundle-*
          path: bundles

      - name: Determine if pre-release
        id: check-tag
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          if [[ "$VERSION" == *-Beta || "$VERSION" == *-RC ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Flagging release as a Pre-release."
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release assets and generate checksums
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          mkdir -p assets
          
          for dir in bundles/bundle-*; do
            if [ -d "$dir" ]; then
              platform="${dir#bundles/bundle-}"
              (cd "$dir" && zip -r "$GITHUB_WORKSPACE/assets/SRAL-${VERSION}-${platform}.zip" .)
            fi
          done
          
          cd assets
          sha256sum *.zip > checksums.txt
          echo "--- GENERATED VERIFIED CHECKSUMS ---"
          cat checksums.txt

      - name: Publish production binaries to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # 3.0.1
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: SRAL ${{ needs.setup.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.check-tag.outputs.is_prerelease }}
          files: |
            assets/*.zip
            assets/checksums.txt
          fail_on_unmatched_files: true
