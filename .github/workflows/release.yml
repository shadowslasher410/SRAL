name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+-Stable"
      - "[0-9]+.[0-9]+.[0-9]+-RC"
      - "[0-9]+.[0-9]+.[0-9]+-Beta"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag/release name to publish (e.g. 1.0.0-Stable)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  validate-version:
    runs-on: ubuntu-24.04
    outputs:
      release_version: ${{ steps.determine-tag.outputs.version }}
      build_variant: ${{ steps.determine-tag.outputs.variant }}
    steps:
      - name: Parse and Validate Target Tag Structure
        id: determine-tag
        run: |
          set -euo pipefail

          RAW_VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "Processing structural review for version token: ${RAW_VERSION}"

          if [[ ! "${RAW_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(Stable|RC|Beta)$ ]]; then
            echo "::error::Provided version string '${RAW_VERSION}' does not adhere to semantic format (Major.Minor.Patch-Stable/RC/Beta)."
            exit 1
          fi

          if [[ "${RAW_VERSION}" == *-Stable || "${RAW_VERSION}" == *-RC ]]; then
            VARIANT_TOKEN="release"
          else
            VARIANT_TOKEN="debug"
          fi

          echo "Validated Version: ${RAW_VERSION}"
          echo "Assigned Variant: ${VARIANT_TOKEN}"

          echo "version=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "variant=${VARIANT_TOKEN}" >> "$GITHUB_OUTPUT"

  setup:
    needs: validate-version
    uses: ./.github/workflows/build.yml
    with:
      release_version: ${{ needs.validate-version.outputs.release_version }}
      build_variant: ${{ needs.validate-version.outputs.build_variant }}

  sign-package-release:
    name: Package and Sign Release Target (${{ matrix.target-name }})
    needs: [validate-version, setup]
    runs-on: ${{ matrix.runner-os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-name: windows-x64
            artifact-base: bundle-windows-x64
            runner-os: windows-2025
            output-archive: SRAL-Windows.zip
          - target-name: linux-x64
            artifact-base: bundle-linux-x64
            runner-os: ubuntu-24.04
            output-archive: SRAL-Linux.tar.gz
          - target-name: macos-universal
            artifact-base: bundle-macos-universal
            runner-os: macos-26
            output-archive: SRAL-macOS.zip
          - target-name: wasm-framework
            artifact-base: bundle-wasm
            runner-os: ubuntu-24.04
            output-archive: SRAL-WebAssembly-Linux.zip
          - target-name: android-arm64
            artifact-base: bundle-android-arm64-v8a
            runner-os: ubuntu-24.04
            output-archive: SRAL-Android-arm64.tar.gz
          - target-name: ios-universal
            artifact-base: bundle-ios
            runner-os: macos-26
            output-archive: SRAL-iOS.ipa
    steps:
      - name: Fetch Compiled Pre-Release Binary Packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ format('{0}-{1}', matrix.artifact-base, needs.validate-version.outputs.build_variant) }}
          path: staging_dist

      - name: Package Release Assets (Windows)
        if: matrix.target-name == 'windows-x64'
        shell: powershell
        run: Compress-Archive -Path staging_dist/* -DestinationPath ${{ matrix.output-archive }}

      - name: Package Release Assets (Linux & Mobile)
        if: matrix.target-name == 'linux-x64' || matrix.target-name == 'android-arm64'
        shell: bash
        run: tar -czvf ${{ matrix.output-archive }} -C staging_dist .

      - name: Package Release Assets (macOS)
        if: matrix.target-name == 'macos-universal'
        shell: bash
        run: zip -r ${{ matrix.output-archive }} staging_dist/

      - name: Package Release Assets (WebAssembly)
        if: matrix.target-name == 'wasm-framework'
        shell: bash
        run: zip -r ${{ matrix.output-archive }} staging_dist/

      - name: Install Apple Certificates and Provisioning Profiles (iOS Only)
        if: matrix.target-name == 'ios-universal'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Code Sign iOS Application Payload (iOS Only)
        if: matrix.target-name == 'ios-universal'
        run: |
          mkdir -p Payload
          cp -r staging_dist/SRAL.app Payload/
          codesign --force --sign "Apple Distribution" --verbose Payload/SRAL.app
          zip -r ${{ matrix.output-archive }} Payload/

      - name: Install Sigstore Cosign CLI tool
        if: matrix.target-name != 'ios-universal'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Generate OIDC Cryptographic Signatures
        if: matrix.target-name != 'ios-universal'
        shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle "${{ matrix.output-archive }}.bundle" \
            "${{ matrix.output-archive }}"

      - name: Deploy Compiled Package Matrix Release Target
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.validate-version.outputs.release_version }}
          name: Release ${{ needs.validate-version.outputs.release_version }}
          files: |
            ${{ matrix.output-archive }}
            ${{ matrix.target-name != 'ios-universal' && format('{0}.bundle', matrix.output-archive) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
