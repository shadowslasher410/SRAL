[versions]
usertarget_macos   = 26.0
usertarget_windows = 10.0.17763.0
usertarget_android = 37 

[paths]
# Absolute directories targeting external screen-reader SDK components and driver binary locations.
# Use standard forward slashes (/) for cross-platform pathing compatibility.

# Path to the native NVDA remote controller dynamic linkage artifacts
nvda_install = 

# Path to regional POSIX/Linux Speech Dispatcher binary communication socket layouts
speechd_install = 

# Overriding directory targeting an isolated Python 3.8+ environment tree
python_install = 

# Absolute path tracking the active Emscripten WebAssembly SDK location
emsdk_install = 

# Absolute folder location addressing the local Google Android NDK workspace tree
android_ndk = 

# Destination folder tracking pre-built multi-platform AccessKit proxy library assets
accesskit_install  = 

# Path mapping the target host Java Development Kit space (required for Android bindings)
jdk_install = 

[logging]
# Runtime diagnostic tracking configuration metrics
# Supported values: TRACE, DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO
log_to_file = true
log_file_path = sral_debug.log
